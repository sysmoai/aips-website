kind = "web"
previewPath = "/"
title = "AIPS - AI Premium Shop"
version = "1.0.0"
id = "artifacts/aips-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21390

[services.development]
run = "pnpm --filter @workspace/aips-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aips-landing", "run", "build" ]
publicDir = "artifacts/aips-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21390"
BASE_PATH = "/"
