name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @workspace/aips-landing build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: /
          VITE_API_URL: https://workspaceapi-server-production-e602.up.railway.app
          VITE_R2_PUBLIC_URL: https://pub-4609709f3bb643adb1af0b0b318fd4f9.r2.dev

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 4ca6269edabb6ad2906d70ec6845de22
          projectName: aips-landing
          directory: artifacts/aips-landing/dist/public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
